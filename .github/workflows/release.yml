name: release

# Build the current prerelease asset. v0.2.0-alpha.33 publishes macOS Apple
# Silicon first after the Rust-native daemon path gained visible terminal-mode
# chrome, OSC window-title propagation, OSC 52 clipboard copy/query,
# alternate-screen restoration, child-exit cleanup, truecolor, resize, and
# scrollback coverage.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0-alpha.33). Used for manual runs."
        required: true

permissions:
  contents: write

env:
  BINARY: tuimux
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add "${{ matrix.target }}"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          TARGET="${{ matrix.target }}"
          STAGE="${BINARY}-${VERSION}-${TARGET}"
          mkdir -p "dist/${STAGE}"

          cp "target/${TARGET}/release/${BINARY}" "dist/${STAGE}/"
          cp README.md "dist/${STAGE}/" 2>/dev/null || true
          [ -f LICENSE ] && cp LICENSE "dist/${STAGE}/" || true
          cat > "dist/${STAGE}/INSTALL.txt" <<EOF
          tuimux ${VERSION} - macOS (${{ matrix.arch }} / ${TARGET})

          Install:
            install -m 0755 ${BINARY} ~/.local/bin/${BINARY}

          Verify:
            ${BINARY} --version
            ${BINARY} --doctor

          One-line installer:
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${VERSION}/scripts/install.sh | TUIMUX_VERSION=${VERSION} bash
          EOF

          tar -C dist -czf "${STAGE}.tar.gz" "$STAGE"
          mkdir -p artifacts
          mv "${STAGE}.tar.gz" artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: artifacts/*
          retention-days: 7

  build-windows:
    if: ${{ false }}
    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x86_64
          - target: aarch64-pc-windows-msvc
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "version=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "version=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
          }

      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}

      - name: Build release binary
        shell: pwsh
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package zip
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $target = "${{ matrix.target }}"
          $stage = "${env:BINARY}-${version}-${target}"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/$target/release/${env:BINARY}.exe" "dist/$stage/"
          Copy-Item "README.md" "dist/$stage/" -ErrorAction SilentlyContinue
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "dist/$stage/" }
          @"
          tuimux $version - Windows (${{ matrix.arch }} / $target)

          Verify:
            ${env:BINARY}.exe --version
            ${env:BINARY}.exe --doctor

          PowerShell installer:
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.ps1 | iex
          "@ | Set-Content -Encoding UTF8 "dist/$stage/INSTALL.txt"
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path "dist/$stage" -DestinationPath "artifacts/$stage.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: artifacts/*
          retention-days: 7

  build-linux:
    if: ${{ false }}
    name: Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
            deb_arch: amd64
            rpm_arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            deb_arch: arm64
            rpm_arch: aarch64
          - target: armv7-unknown-linux-gnueabihf
            arch: armv7
            deb_arch: armhf
            rpm_arch: armv7hl
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust and packaging tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rpm
          rustup toolchain install stable --profile minimal
          rustup target add "${{ matrix.target }}"
          cargo install cargo-zigbuild --locked

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}

      - name: Build release binary
        shell: bash
        run: cargo zigbuild --release --locked --target "${{ matrix.target }}"

      - name: Package tarball, deb, and rpm
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          PKG_VERSION="${VERSION#v}"
          if [[ "$PKG_VERSION" == *-* ]]; then
            DEB_VERSION="${PKG_VERSION%%-*}~${PKG_VERSION#*-}"
          else
            DEB_VERSION="$PKG_VERSION"
          fi
          RPM_VERSION="${PKG_VERSION%%-*}"
          RPM_RELEASE="${PKG_VERSION#*-}"
          if [ "$RPM_RELEASE" = "$PKG_VERSION" ]; then RPM_RELEASE="1"; fi
          RPM_RELEASE="${RPM_RELEASE//-/_}"
          TARGET="${{ matrix.target }}"
          DEB_ARCH="${{ matrix.deb_arch }}"
          RPM_ARCH="${{ matrix.rpm_arch }}"
          STAGE="${BINARY}-${VERSION}-${TARGET}"
          BIN="target/${TARGET}/release/${BINARY}"

          mkdir -p artifacts "dist/${STAGE}"
          cp "$BIN" "dist/${STAGE}/"
          cp README.md "dist/${STAGE}/" 2>/dev/null || true
          [ -f LICENSE ] && cp LICENSE "dist/${STAGE}/" || true
          cat > "dist/${STAGE}/INSTALL.txt" <<EOF
          tuimux ${VERSION} - Linux (${{ matrix.arch }} / ${TARGET})

          Install tarball binary:
            install -m 0755 ${BINARY} ~/.local/bin/${BINARY}

          Or install the .deb/.rpm asset for your distro and architecture.
          EOF
          tar -C dist -czf "artifacts/${STAGE}.tar.gz" "$STAGE"

          DEB_ROOT="pkg/deb/${BINARY}_${DEB_VERSION}_${DEB_ARCH}"
          mkdir -p "${DEB_ROOT}/DEBIAN" "${DEB_ROOT}/usr/bin" "${DEB_ROOT}/usr/share/doc/${BINARY}"
          install -m 0755 "$BIN" "${DEB_ROOT}/usr/bin/${BINARY}"
          cp README.md "${DEB_ROOT}/usr/share/doc/${BINARY}/README.md"
          [ -f LICENSE ] && cp LICENSE "${DEB_ROOT}/usr/share/doc/${BINARY}/LICENSE" || true
          cat > "${DEB_ROOT}/DEBIAN/control" <<EOF
          Package: ${BINARY}
          Version: ${DEB_VERSION}
          Section: utils
          Priority: optional
          Architecture: ${DEB_ARCH}
          Maintainer: hungryZoo
          Description: Prefix-free, mouse-first Rust-native terminal multiplexer
           tuimux runs shell windows in PTYs and renders them with a ratatui interface.
          EOF
          dpkg-deb --build "${DEB_ROOT}" "artifacts/${BINARY}_${DEB_VERSION}_${DEB_ARCH}.deb"

          RPM_TOP="$PWD/pkg/rpm/${RPM_ARCH}"
          mkdir -p "${RPM_TOP}"/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          install -m 0755 "$BIN" "${RPM_TOP}/SOURCES/${BINARY}"
          cat > "${RPM_TOP}/SPECS/${BINARY}.spec" <<EOF
          Name: ${BINARY}
          Version: ${RPM_VERSION}
          Release: ${RPM_RELEASE}%{?dist}
          Summary: Prefix-free, mouse-first Rust-native terminal multiplexer
          License: MIT
          URL: https://github.com/${{ github.repository }}
          Source0: ${BINARY}

          %description
          tuimux runs shell windows in PTYs and renders them with a ratatui interface.

          %prep

          %build

          %install
          mkdir -p %{buildroot}/usr/bin
          install -m 0755 %{SOURCE0} %{buildroot}/usr/bin/${BINARY}

          %files
          /usr/bin/${BINARY}
          EOF
          rpmbuild -bb \
            --target "${RPM_ARCH}" \
            --define "_topdir ${RPM_TOP}" \
            --define "__os_install_post %{nil}" \
            "${RPM_TOP}/SPECS/${BINARY}.spec"
          find "${RPM_TOP}/RPMS" -type f -name '*.rpm' -exec cp {} artifacts/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: artifacts/*
          retention-days: 7

  release:
    name: publish prerelease
    needs: [build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble assets + SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( \
            -name '*.tar.gz' -o \
            -name '*.zip' -o \
            -name '*.deb' -o \
            -name '*.rpm' \
          \) -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          echo "Release assets:"
          ls -la
          echo
          cat SHA256SUMS

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: tuimux ${{ steps.ver.outputs.version }}
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## tuimux ${{ steps.ver.outputs.version }} (prerelease)

            macOS Apple Silicon prerelease asset is attached:
            - `tuimux-${{ steps.ver.outputs.version }}-aarch64-apple-darwin.tar.gz`

            This prerelease keeps the default runtime on tuimux's Rust-native daemon-backed multiplexer, restores the boxed Detach/WINDOWS/STATUS terminal rail, removes the multi-session product surface, and normalizes HVP cursor-position sequences used by `btop`. It runs shell windows in real PTYs owned by a tuimux daemon, renders through `vt100` + ratatui, keeps terminal mode fullscreen, focuses navigation on the right-side window list with keyboard window create/close shortcuts, removes legacy split layout state from the native mux core while keeping split hotkeys deprecated in the UI, removes stale split-pane/resize examples from the static layout preview, adds active-terminal scrollback navigation, maps terminal Home/End and Cmd-Shift-Left/Cmd-Shift-Right to line start/end, preserves drag selection after mouse-up with explicit selection lifecycle regressions, copies selected text with Ctrl-C/Ctrl-Shift-C/Cmd-Shift-C or the right-click context menu through the system clipboard instead of interrupting the child process, preserves plain Ctrl-C as child interrupt when no selection exists, pastes clipboard text into the active PTY with Ctrl-V/Ctrl-Shift-V/Cmd-Shift-V or that Copy/Paste/Cancel context menu, verifies daemon-side selected-text extraction/highlighting, adds a macOS PTY UI smoke for reverse-video selection highlight after mouse-up + drag + right-click context menu Copy + Ctrl-C + `pbpaste` + no foreground SIGINT + context menu Paste + child bracketed paste wrapper preservation, adds a macOS mouse-protocol smoke for child SGR mouse normal-left-click forwarding + normal-drag selection, adds a macOS scrollback smoke proving mouse wheel, PageUp, Home, and End navigate active terminal history in the real TUI and paste while scrolled back returns to the live bottom, adds a macOS truecolor smoke proving child `38;2`/`48;2` output survives parent `NO_COLOR`, adds a macOS resize smoke proving host resize reaches the active child PTY as `SIGWINCH` with updated rows/columns, adds a local app smoke for `llmfit --help`, `btop`, `htop`, and `nano`, adds a window-flow smoke for right-side window workflow + split deprecation + detach/reattach shell persistence, adds a no-tmux smoke proving the default TUI and doctor work without `tmux` in PATH while `--native-client` fails clearly, and keeps PTYs alive across UI detach/reattach.

            ### macOS Apple Silicon installer
            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.ver.outputs.version }}/scripts/install.sh | TUIMUX_VERSION=${{ steps.ver.outputs.version }} bash
            ```

            The default tuimux UI no longer requires `tmux`. Checksums are in `SHA256SUMS`.
          files: |
            release/*
